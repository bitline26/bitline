<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 40" fill="none">

  <!-- 곡선 상승 마크: 베지어 곡선으로 부드러운 트렌드 라인 -->
  <path
    d="M 4 30 C 10 30 12 22 18 18 C 24 14 26 20 32 14 C 36 10 38 8 42 6"
    stroke="url(#curveGrad)"
    stroke-width="2.4"
    stroke-linecap="round"
    fill="none"
  />
  <!-- 끝점 글로우 원 -->
  <circle cx="42" cy="6" r="3" fill="#ef4444" opacity="0.9"/>
  <circle cx="42" cy="6" r="5.5" fill="#ef4444" opacity="0.2"/>

  <!-- 워드마크 비트라인 -->
  <text
    x="54" y="27"
    font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="-1"
    fill="#f8fafc"
  >비트라인</text>

  <!-- 텍스트 하단 곡선 언더라인 (텍스트 곡선과 호응) -->
  <path
    d="M 54 31 Q 97 34 142 31"
    stroke="url(#underGrad)"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.6"
  />

  <defs>
    <linearGradient id="curveGrad" x1="4" y1="30" x2="42" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="underGrad" x1="54" y1="0" x2="142" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

</svg>
